<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change password — Medical Lab</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body.login-page { background: #e8eef5; }
        .auth-wrap { display: flex; justify-content: center; padding: 40px 16px 80px; }
        .form-card-auth { background: #fff; padding: 32px; border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,.08); width: 100%; max-width: 480px; }
        .form-card-auth h1 { margin-bottom: 8px; color: #333; font-size: 24px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 18px; line-height: 1.5; }
        .hidden { display: none; }
        .muted { font-size: 13px; color: #777; margin-top: 14px; }
    </style>
</head>
<body class="login-page">
    <nav class="navbar">
        <div class="navbar-brand">Medical Lab System</div>
        <div class="navbar-links">
            <a href="../index.html">Home</a>
        </div>
    </nav>

    <div class="auth-wrap">
        <div class="form-card-auth">
            <h1>Change password</h1>
            <p class="subtitle">Your administrator or system policy requires updating your password before continuing. Use your <strong>current</strong> password, then choose a new one.</p>

            <div id="pwdAlertSuccess" class="alert alert-success hidden" role="status"></div>
            <div id="pwdAlertError" class="alert alert-error hidden" role="alert"></div>

            <form id="changePasswordForm" novalidate>
                <div class="form-group">
                    <label for="currentPassword">Current password</label>
                    <input type="password" id="currentPassword" autocomplete="current-password" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">New password</label>
                    <input type="password" id="newPassword" autocomplete="new-password" required minlength="6"
                           placeholder="min. 6 characters">
                </div>
                <div class="form-group">
                    <label for="confirmNewPassword">Confirm new password</label>
                    <input type="password" id="confirmNewPassword" autocomplete="new-password" required minlength="6">
                </div>
                <button type="submit" class="btn-primary" id="changePwdSubmitBtn">Update password</button>
            </form>

            <p class="muted">After success you will be redirected to your dashboard.</p>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/ui.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/guards.js"></script>
    <script>
        function showPwdError(msg) {
            var ok = document.getElementById('pwdAlertSuccess');
            var bad = document.getElementById('pwdAlertError');
            ok.classList.add('hidden');
            if (!msg) {
                bad.classList.add('hidden');
                bad.textContent = '';
                return;
            }
            bad.textContent = msg;
            bad.classList.remove('hidden');
        }

        function showPwdSuccess(msg) {
            var ok = document.getElementById('pwdAlertSuccess');
            var bad = document.getElementById('pwdAlertError');
            bad.classList.add('hidden');
            ok.textContent = msg || 'Password updated.';
            ok.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', function () {
            if (typeof requireAuth === 'function' && !requireAuth()) {
                return;
            }

            document.getElementById('changePasswordForm').addEventListener('submit', async function (ev) {
                ev.preventDefault();
                showPwdError('');

                var cur = document.getElementById('currentPassword').value;
                var nw = document.getElementById('newPassword').value;
                var cf = document.getElementById('confirmNewPassword').value;

                if (!cur || !nw || !cf) {
                    showPwdError('All fields are required.');
                    return;
                }
                if (nw.length < 6) {
                    showPwdError('New password must be at least 6 characters.');
                    return;
                }
                if (nw !== cf) {
                    showPwdError('New password and confirmation must match.');
                    return;
                }

                var btn = document.getElementById('changePwdSubmitBtn');
                var idle = btn.textContent;

                try {
                    btn.disabled = true;
                    btn.textContent = 'Saving…';

                    await changePassword(cur, nw);
                    await getMe();

                    showPwdSuccess('Password updated successfully. Redirecting…');

                    if (typeof showToast === 'function') {
                        showToast('Password updated successfully.', 'success', 4000);
                    }

                    var role = typeof getCurrentRole === 'function' ? getCurrentRole() : 'patient';
                    var target =
                        typeof getDashboardPath === 'function'
                            ? getDashboardPath(role)
                            : 'patient/dashboard.html';

                    setTimeout(function () {
                        window.location.href = target;
                    }, 1000);
                } catch (err) {
                    btn.disabled = false;
                    btn.textContent = idle;
                    var msg = err && err.message ? err.message : 'Could not update password.';
                    showPwdError(msg);
                    if (typeof showToast === 'function') showToast(msg, 'error', 6500);
                }
            });
        });
    </script>
</body>
</html>
