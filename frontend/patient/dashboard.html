<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Dashboard — Medical Lab</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .bar { display: flex; align-items: center; justify-content: space-between; gap: 16px; width: 100%; }
        .hello { opacity: 0.95; font-size: 14px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="bar">
            <div class="navbar-brand">Medical Lab — Patient</div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <span class="hello" id="welcomeLine">Patient</span>
                <button type="button" class="logout-btn" onclick="logoutUser()">Logout</button>
            </div>
        </div>
    </nav>
    <main class="main-content">
        <div class="page-header">
            <h1>Patient Dashboard</h1>
            <p style="color: #666; margin-top: 8px;">
                Authenticated Phase 3 placeholder. Appointments and results connect in a later phase.
            </p>
        </div>
    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/ui.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/guards.js"></script>
    <script>
        (function () {
            if (typeof requireAuth !== 'function' || !requireAuth()) return;
            if (typeof requireRole !== 'function' || !requireRole('patient')) return;

            var u = typeof getCurrentUser === 'function' ? getCurrentUser() : null;
            var label = document.getElementById('welcomeLine');
            if (u && label) label.textContent = u.fullName || u.phoneNumber || 'Patient';
        })();
    </script>
</body>
</html>
