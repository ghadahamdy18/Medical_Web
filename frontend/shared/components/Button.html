<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button - Medical Lab System</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; text-decoration: none; display: inline-block; }
        .btn-primary { background: #2c7be5; color: #fff; }
        .btn-primary:hover { background: #1a68d4; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn-success { background: #28a745; color: #fff; }
        .btn-danger { background: #dc3545; color: #fff; }
        .btn-outline { background: transparent; border: 1px solid #2c7be5; color: #2c7be5; }
        .btn-sm { padding: 8px 15px; font-size: 12px; }
        .btn-lg { padding: 15px 30px; font-size: 16px; }
    </style>
</head>
<body>
    <a href="#" class="btn btn-primary">Primary Button</a>
    <a href="#" class="btn btn-secondary">Secondary Button</a>
    <a href="#" class="btn btn-success">Success Button</a>
    <a href="#" class="btn btn-danger">Danger Button</a>
    <a href="#" class="btn btn-outline">Outline Button</a>
</body>
</html>
