<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loader - Medical Lab System</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .loader-container { display: flex; justify-content: center; align-items: center; padding: 40px; }
        .loader { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #2c7be5; border-radius: 50%; animation: spin 1s linear infinite; }
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="loader"></div>
    </div>
    
    <div class="loader-overlay" id="pageLoader">
        <div class="loader"></div>
    </div>
</body>
</html>
