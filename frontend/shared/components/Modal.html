<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal - Medical Lab System</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .modal-example { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-example.active { display: flex; }
        .modal-example-content { background: #fff; padding: 30px; border-radius: 8px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-example-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .modal-example-close { background: none; border: none; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>
    <button class="btn btn-primary" onclick="openModal('exampleModal')">Open Modal</button>
    
    <div class="modal-example" id="exampleModal">
        <div class="modal-example-content">
            <div class="modal-example-header">
                <h3>Modal Title</h3>
                <button class="modal-example-close" onclick="closeModal('exampleModal')">&times;</button>
            </div>
            <p>This is the modal content.</p>
            <div class="form-actions" style="margin-top: 20px;">
                <button class="btn btn-secondary" onclick="closeModal('exampleModal')">Close</button>
                <button class="btn btn-primary">Confirm</button>
            </div>
        </div>
    </div>
    
    <script>
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
