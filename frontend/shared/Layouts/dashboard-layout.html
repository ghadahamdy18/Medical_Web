<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Layout - Medical Lab System</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .dashboard-layout { display: flex; min-height: 100vh; }
        .dashboard-sidebar { width: 250px; background: #fff; border-right: 1px solid #eee; padding: 20px; }
        .dashboard-main { flex: 1; display: flex; flex-direction: column; }
        .dashboard-header { background: #fff; padding: 15px 30px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .dashboard-content { flex: 1; padding: 30px; }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-brand" style="font-size: 20px; font-weight: bold; margin-bottom: 30px; color: #2c7be5;">
                Medical Lab
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="appointments.html">Appointments</a></li>
                <li><a href="lab-results.html">Lab Results</a></li>
                <li><a href="notifications.html">Notifications</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
        </aside>

        <div class="dashboard-main">
            <header class="dashboard-header">
                <h3>Dashboard</h3>
                <div class="navbar-user">
                    <span class="profile-badge" id="userName">User</span>
                    <button class="logout-btn" onclick="authService.logout()">Logout</button>
                </div>
            </header>

            <main class="dashboard-content">
                <!-- Page content goes here -->
            </main>
        </div>
    </div>
    <script src="../../js/auth.js"></script>
</body>
</html>
