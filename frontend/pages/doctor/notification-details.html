<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Details - Doctor Portal</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <style>
        .notification-detail { max-width: 700px; margin: 0 auto; }
        .detail-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 30px; }
        .detail-header { display: flex; gap: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .detail-icon { width: 60px; height: 60px; background: #e8f0fe; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="page-header">
            <h1><a href="notifications.html" style="color: #333; text-decoration: none;">←</a> Notification Details</h1>
        </div>

        <div class="notification-detail">
            <div class="detail-card">
                <div class="detail-header">
                    <div class="detail-icon">👤</div>
                    <div>
                        <div style="font-size: 24px; font-weight: 600;">New Patient Assigned</div>
                        <div style="color: #999; font-size: 14px;">Today, 9:15 AM</div>
                    </div>
                </div>
                <div style="font-size: 16px; line-height: 1.8; color: #333; margin-bottom: 20px;">
                    <p>You have been assigned a new patient: <strong>John Smith</strong></p>
                    <p style="margin-top: 15px;"><strong>Patient Details:</strong></p>
                    <p>• Age: 45 years</p>
                    <p>• Gender: Male</p>
                    <p>• Contact: (555) 123-4567</p>
                    <p style="margin-top: 15px;">Please review their medical history and prepare for their appointment.</p>
                </div>
                <div class="form-actions">
                    <a href="patient-list.html" class="btn-primary">View Patient</a>
                    <a href="dashboard.html" class="btn-secondary">Go to Dashboard</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../js/auth.js"></script>
</body>
</html>
