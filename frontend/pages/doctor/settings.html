<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Medical Lab</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
    <style>
        body {
            background: #f8fafc
        }
        .dashboard {
            display: flex;
            flex-direction: column;
            min-height: 100vh
        }
        .dashboard-body {
            display: flex;
            flex: 1
        }
        .sidebar {
            width: 250px;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            padding: 20px 0
        }
        .sidebar-logo {
            padding: 0 20px 20px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 20px
        }
        .sidebar-logo h2 {
            color: #0f766e;
            font-size: 20px
        }
        .sidebar-menu {
            list-style: none
        }
        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #64748b;
            text-decoration: none;
            transition: all .2s
        }
        .sidebar-menu li a:hover,
        .sidebar-menu li a.active {
            background: #ccfbf1;
            color: #0f766e;
            border-right: 3px solid #0f766e
        }
        .main-area {
            flex: 1
        }
        .top-bar {
            background: #fff;
            padding: 15px 30px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            background: #10b981;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold
        }
        .user-details {
            display: flex;
            flex-direction: column
        }
        .user-name {
            font-weight: 600;
            font-size: 14px
        }
        .user-role {
            font-size: 12px;
            color: #64748b
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #0f766e;
            text-decoration: none
        }
        .page-header {
            margin-bottom: 25px
        }
        .page-header h1 {
            font-size: 24px;
            color: #0f172a
        }
        .settings-section {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
            max-width: 600px;
            margin-bottom: 20px
        }
        .settings-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee
        }
        .form-group {
            margin-bottom: 20px
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            font-size: 14px
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0f766e
        }
        .btn-save {
            background: #0f766e;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px
        }
        .btn-save:hover {
            background: #115e59
        }
        .back-link {
            display: inline-block; position: relative; overflow: hidden; background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.10), transparent 30%), radial-gradient(circle at bottom left, rgba(15, 118, 110, 0.08), transparent 32%), #f8fafc; }

        .content-area { padding: 30px; position: relative; overflow: hidden; background: radial-gradient(circle at 15% 18%, rgba(56, 189, 248, 0.24), transparent 32%), radial-gradient(circle at 88% 10%, rgba(15, 118, 110, 0.22), transparent 30%), linear-gradient(135deg, #dff5f5 0%, #d7f0f2 45%, #e8fafa 100%); }
        .content-area::before { content: ""; position: absolute; width: 600px; height: 600px; border: 4px solid rgba(15, 118, 110, 0.22); border-radius: 50%; top: -250px; right: -180px; pointer-events: none; z-index: 0; animation: waveUpDown 9s ease-in-out infinite; }
        .content-area::after { content: ""; position: absolute; width: 500px; height: 500px; border: 4px solid rgba(37, 99, 235, 0.16); border-radius: 50%; bottom: -210px; left: -160px; pointer-events: none; z-index: 0; animation: waveDownUp 11s ease-in-out infinite; }
        .content-area > * { position: relative; z-index: 1; }
        @keyframes waveUpDown { 0% { transform: translateY(0); } 50% { transform: translateY(28px); } 100% { transform: translateY(0); } }
        @keyframes waveDownUp { 0% { transform: translateY(0); } 50% { transform: translateY(-28px); } 100% { transform: translateY(0); } }
</style>
</head>

<body>
    <div class="dashboard">
        <div class="dashboard-body">
            <aside class="sidebar">
                <div class="sidebar-logo">
                    <h2>Medical Lab</h2>
                </div>
                <ul class="sidebar-menu">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="appointments.html">Appointments</a></li>
                    <li><a href="upload-results.html">Upload Results</a></li>
                    <li><a href="settings.html" class="active">Settings</a></li>
                </ul>
            </aside>
            <div class="main-area">
                <div class="top-bar">
                    <div class="user-info">
                        <div class="user-avatar" id="userInitials">SS</div>
                        <div class="user-details">
                            <span class="user-name" id="userName"></span>
                            <span class="user-role">Doctor</span>
                        </div>
                    </div>
                    <div class="top-bar-right">
                        <button class="logout-btn" onclick="logoutUser()">Logout</button>
                    </div>
                </div>
                <div class="content-area">
                    <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
                    <div class="page-header">
                        <h1>Settings</h1>
                    </div>
                    <div class="settings-section">
                        <div class="settings-title">Profile Information</div>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="profileName" value="">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="profileEmail" value="">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="profilePhone" value="">
                        </div>
                        <div class="form-group">
                            <label>Specialization</label>
                            <select id="profileSpecialization">
                                <option>General Medicine</option>
                                <option>Pathology</option>
                                <option>Cardiology</option>
                                <option>Endocrinology</option>
                            </select>
                        </div>
                        <button class="btn-save" id="btnSaveProfile" onclick="saveProfile()">Save Changes</button>
                    </div>
                    <div class="settings-section">
                        <div class="settings-title">Change Password</div>
                        <div class="form-group">
                            <label>Current Password</label>
                            <input type="password" id="currentPassword" placeholder="Enter current password">
                        </div>
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" id="newPassword" placeholder="Enter new password">
                        </div>
                        <div class="form-group">
                            <label>Confirm New Password</label>
                            <input type="password" id="confirmPassword" placeholder="Confirm new password">
                        </div>
                        <button class="btn-save" id="btnChangePassword" onclick="updatePassword()">Update
                            Password</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/ui.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/guards.js"></script>
    <script src="../../assets/js/doctor.js"></script>
    <script>
        // Require doctor role
        requireRole('doctor');

        // Initialize page
        async function initializePage() {
            try {
                const user = getCurrentUser();
                if (!user) {
                    window.location.href = '../../index.html';
                    return;
                }

                // Update user info in top bar
                document.getElementById('userName').textContent = user.fullName || user.name || 'Doctor';
                const name = user.fullName || user.name || 'Doctor';
                const initials = name.split(' ').map(n => n[0]).join('').toUpperCase();
                document.getElementById('userInitials').textContent = initials;

                // Load user profile data into form
                document.getElementById('profileName').value = name;
                document.getElementById('profileEmail').value = user.email || '';
                document.getElementById('profilePhone').value = user.phoneNumber || user.phone || '';

                if (user.specialization) {
                    const specSelect = document.getElementById('profileSpecialization');
                    let foundSpec = false;
                    for (let i = 0; i < specSelect.options.length; i++) {
                        if (specSelect.options[i].text === user.specialization || specSelect.options[i].value === user.specialization) {
                            specSelect.selectedIndex = i;
                            foundSpec = true;
                            break;
                        }
                    }
                    if (!foundSpec) {
                        const newOption = document.createElement('option');
                        newOption.text = user.specialization;
                        newOption.value = user.specialization;
                        specSelect.add(newOption);
                        specSelect.selectedIndex = specSelect.options.length - 1;
                    }
                }

            } catch (error) {
                console.error('Failed to initialize page:', error);
                if (typeof showToast === 'function') {
                    showToast('Failed to load page', 'error');
                }
            }
        }

        // Save profile changes
        async function saveProfile() {
            const btn = document.getElementById('btnSaveProfile');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const fullName = document.getElementById('profileName').value.trim();
                const email = document.getElementById('profileEmail').value.trim();

                if (!fullName) {
                    throw new Error('Full name is required');
                }

                const payload = { fullName };
                if (email) payload.email = email;

                const response = await apiPatch('/auth/profile', payload);

                // Update local storage with new user data
                const updatedUser = response.user || response;
                saveCurrentUser(updatedUser);

                // Update the top bar
                document.getElementById('userName').textContent = updatedUser.fullName || fullName;
                const initials = (updatedUser.fullName || fullName).split(' ').map(n => n[0]).join('').toUpperCase();
                document.getElementById('userInitials').textContent = initials;

                if (typeof showToast === 'function') {
                    showToast('Profile updated successfully!', 'success');
                } else {
                    alert('Profile updated successfully!');
                }
            } catch (error) {
                console.error('Failed to update profile:', error);
                if (typeof showToast === 'function') {
                    showToast(error.message || 'Failed to update profile', 'error');
                } else {
                    alert(error.message || 'Failed to update profile');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Changes';
            }
        }

        // Update password
        async function updatePassword() {
            const btn = document.getElementById('btnChangePassword');
            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (!currentPassword || !newPassword || !confirmPassword) {
                    throw new Error('All password fields are required');
                }

                if (newPassword !== confirmPassword) {
                    throw new Error('New password and confirm password do not match');
                }

                if (newPassword.length < 6) {
                    throw new Error('New password must be at least 6 characters');
                }

                await apiPatch('/auth/change-password', {
                    currentPassword,
                    newPassword,
                    confirmPassword,
                });

                // Clear the form
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';

                if (typeof showToast === 'function') {
                    showToast('Password updated successfully!', 'success');
                } else {
                    alert('Password updated successfully!');
                }
            } catch (error) {
                console.error('Failed to update password:', error);
                if (typeof showToast === 'function') {
                    showToast(error.message || 'Failed to update password', 'error');
                } else {
                    alert(error.message || 'Failed to update password');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>

</html>
