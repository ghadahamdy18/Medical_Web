<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Doctor Portal</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #2c7be5 0%, #1a68d4 100%); padding: 20px; }
        .login-card { background: #fff; padding: 40px; border-radius: 12px; width: 400px; max-width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { color: #2c7be5; margin-bottom: 10px; }
        .login-header p { color: #666; }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <h1>Reset Password</h1>
                <p>Enter your phone number to reset your password</p>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter your phone number">
            </div>
            <button type="button" class="btn-primary" onclick="sendResetCode()">Send Reset Code</button>
            
            <p style="text-align: center; margin-top: 20px;">
                <a href="login.html" style="color: #666; text-decoration: none;">← Back to Login</a>
            </p>
        </div>
    </div>

    <script>
        function sendResetCode() {
            const phone = document.getElementById('phone').value;
            if (!phone) { alert('Please enter phone number'); return; }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.phone === phone && u.role === 'doctor');
            
            if (user) {
                window.location.href = '../auth/verify-otp.html?phone=' + encodeURIComponent(phone);
            } else {
                alert('No doctor account found with this phone number');
            }
        }
    </script>
</body>
</html>
