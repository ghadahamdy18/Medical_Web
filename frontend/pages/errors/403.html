<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Forbidden | Medical Lab System</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .error-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .error-code { font-size: 120px; font-weight: bold; color: #dc3545; margin-bottom: 20px; }
        .error-title { font-size: 32px; color: #0f172a; margin-bottom: 15px; }
        .error-message { font-size: 18px; color: #64748b; margin-bottom: 30px; max-width: 500px; }
        .error-actions { display: flex; gap: 15px; }
        .btn-home { background: #0f766e; color: #fff; padding: 15px 30px; border-radius: 8px; text-decoration: none; }
        .btn-login { background: #10b981; color: #fff; padding: 15px 30px; border-radius: 8px; text-decoration: none; }

        .content-area { padding: 30px; position: relative; overflow: hidden; background: radial-gradient(circle at 15% 18%, rgba(56, 189, 248, 0.24), transparent 32%), radial-gradient(circle at 88% 10%, rgba(15, 118, 110, 0.22), transparent 30%), linear-gradient(135deg, #dff5f5 0%, #d7f0f2 45%, #e8fafa 100%); }
        .content-area::before { content: ""; position: absolute; width: 600px; height: 600px; border: 4px solid rgba(15, 118, 110, 0.22); border-radius: 50%; top: -250px; right: -180px; pointer-events: none; z-index: 0; animation: waveUpDown 9s ease-in-out infinite; }
        .content-area::after { content: ""; position: absolute; width: 500px; height: 500px; border: 4px solid rgba(37, 99, 235, 0.16); border-radius: 50%; bottom: -210px; left: -160px; pointer-events: none; z-index: 0; animation: waveDownUp 11s ease-in-out infinite; }
        .content-area > * { position: relative; z-index: 1; }
        @keyframes waveUpDown { 0% { transform: translateY(0); } 50% { transform: translateY(28px); } 100% { transform: translateY(0); } }
        @keyframes waveDownUp { 0% { transform: translateY(0); } 50% { transform: translateY(-28px); } 100% { transform: translateY(0); } }
</style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">403</div>
        <h1 class="error-title">Access Forbidden</h1>
        <p class="error-message">You do not have permission to access this page. Please contact the administrator if you believe this is an error.</p>
        <div class="error-actions">
            <a href="../../../index.html" class="btn-home">Go to Home</a>
            <a href="../../../index.html" class="btn-login">Login</a>
        </div>
    </div>
</body>
</html>
