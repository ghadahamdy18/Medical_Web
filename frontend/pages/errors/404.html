<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Medical Lab System</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .error-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .error-code { font-size: 120px; font-weight: bold; color: #0f766e; margin-bottom: 20px; }
        .error-title { font-size: 32px; color: #0f172a; margin-bottom: 15px; }
        .error-message { font-size: 18px; color: #64748b; margin-bottom: 30px; max-width: 500px; }
        .error-actions { display: flex; gap: 15px; }
        .btn-home { background: #0f766e; color: #fff; padding: 15px 30px; border-radius: 8px; text-decoration: none; }
        .btn-back { background: #6c757d; color: #fff; padding: 15px 30px; border-radius: 8px; text-decoration: none; }

        .content-area { padding: 30px; position: relative; overflow: hidden; background: radial-gradient(circle at 80% 12%, rgba(15, 118, 110, 0.035), transparent 34%), radial-gradient(circle at 18% 78%, rgba(37, 99, 235, 0.025), transparent 38%), linear-gradient(135deg, #f7fafc 0%, #f3f7f9 45%, #eef4f7 100%); }
        .content-area::before { content: ""; position: absolute; width: 780px; height: 780px; border: 1px solid rgba(15, 118, 110, 0.045); border-radius: 50%; top: -260px; right: -160px; pointer-events: none; z-index: 0; }
        .content-area::after { content: ""; position: absolute; width: 680px; height: 680px; border: 1px solid rgba(37, 99, 235, 0.035); border-radius: 50%; bottom: -360px; left: -240px; pointer-events: none; z-index: 0; }
        .content-area > * { position: relative; z-index: 1; }
</style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">Sorry, the page you are looking for does not exist or has been moved.</p>
        <div class="error-actions">
            <a href="../../../index.html" class="btn-home">Go to Home</a>
            <a href="javascript:history.back()" class="btn-back">Go Back</a>
        </div>
    </div>
</body>
</html>
