<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Medical Lab System</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .error-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .error-code { font-size: 120px; font-weight: bold; color: #2c7be5; margin-bottom: 20px; }
        .error-title { font-size: 32px; color: #333; margin-bottom: 15px; }
        .error-message { font-size: 18px; color: #666; margin-bottom: 30px; max-width: 500px; }
        .error-actions { display: flex; gap: 15px; }
        .btn-home { background: #2c7be5; color: #fff; padding: 15px 30px; border-radius: 8px; text-decoration: none; }
        .btn-back { background: #6c757d; color: #fff; padding: 15px 30px; border-radius: 8px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">Sorry, the page you are looking for does not exist or has been moved.</p>
        <div class="error-actions">
            <a href="../../../index.html" class="btn-home">Go to Home</a>
            <a href="javascript:history.back()" class="btn-back">Go Back</a>
        </div>
    </div>
</body>
</html>
