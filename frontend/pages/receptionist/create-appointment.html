<body>
    <div class="dashboard">
        <div class="dashboard-body">
            <aside class="sidebar">
                <div class="sidebar-logo"><h2>Medical Lab</h2></div>
                <ul class="sidebar-menu">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="patients.html">Patients</a></li>
                    <li><a href="create-patient.html">Create Patient</a></li>
                    <li><a href="appointments.html">Appointments</a></li>
                    <li><a href="create-appointment.html" class="active">Create Appointment</a></li>
                    <li><a href="settings.html">Settings</a></li>
                </ul>
            </aside>

            <div class="main-area">
                <div class="top-bar">
                    <div class="user-info">
                        <div class="user-avatar" id="userInitials">R</div>

                    <div id="loading" class="loading">Loading form data...</div>

                    <div id="appointmentForm" class="form-card" style="display:none;">

                        <form id="createAppointmentForm" onsubmit="handleCreateAppointment(event)">

                            <div class="form-group">

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/ui.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/guards.js"></script>
    <script src="../../assets/js/receptionist.js"></script>
    <script>
        requireRole('receptionist');

        let patients = [];
        let allProfiles = [];
        let selectedPatient = null;
        let doctors = [];
        const preselectedUserId = getQueryParam('userId');

        function getInitials(name) {
            return String(name || 'Receptionist')
                .trim()
                .split(/\s+/)
                .map(part => part.charAt(0))
                .join('')
                .toUpperCase()
                .slice(0, 2);
        }

        function clearErrors() {
            ['patientError', 'profileError', 'doctorError', 'dateError', 'timeError', 'addressError'].forEach(id => {
                const element = document.getElementById(id);
                if (element) element.textContent = '';
            });
        }

        function normalizeListResponse(response, keys) {
            if (Array.isArray(response)) return response;
            if (!response) return [];
            if (Array.isArray(response.data)) return response.data;

            for (const key of keys) {
                if (Array.isArray(response[key])) return response[key];
                if (response.data && Array.isArray(response.data[key])) return response.data[key];
            }

            return [];
        }

        function getAuthToken() {
            return localStorage.getItem('token') ||
                localStorage.getItem('authToken') ||
                localStorage.getItem('accessToken') ||
                sessionStorage.getItem('token') ||
                sessionStorage.getItem('authToken') ||
                '';
        }

        async function fetchJson(url) {
            const token = getAuthToken();
            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    ...(token ? { Authorization: `Bearer ${token}` } : {})
                }
            });

            if (!response.ok) {
                throw new Error(`${url} failed with ${response.status}`);
            }

            return response.json();
        }

        async function tryApiCalls(calls) {
            let lastError = null;

            for (const call of calls) {
                try {
                    const result = await call();
                    if (result !== undefined && result !== null) return result;
                } catch (error) {
                    lastError = error;
                    console.warn('API attempt failed:', error.message || error);
                }
            }

            throw lastError || new Error('No API call succeeded');
        }

        async function initializePage() {
            try {
                const user = getCurrentUser();
                if (!user) {
                    window.location.href = '../../index.html';
                    return;
                }

                const name = user.fullName || user.name || 'Receptionist';
                document.getElementById('userName').textContent = name;
                document.getElementById('userInitials').textContent = getInitials(name);

                await loadFormData();
            } catch (error) {
                console.error('Failed to initialize page:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('appointmentForm').style.display = 'block';
                if (typeof showToast === 'function') showToast('Failed to load form data', 'error');
            }
        }

        async function loadFormData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('appointmentForm').style.display = 'none';

            await Promise.all([
                loadPatientsAndProfiles(),
                loadDoctors()
            ]);

            if (preselectedUserId) {
                await selectPatient(preselectedUserId);
            }

            document.getElementById('appointmentDate').min = new Date().toISOString().split('T')[0];
            document.getElementById('loading').style.display = 'none';
            document.getElementById('appointmentForm').style.display = 'block';
        }

        async function loadPatientsAndProfiles() {
            const profileSelect = document.getElementById('patientProfile');
            profileSelect.disabled = false;
            profileSelect.innerHTML = '<option value="">Loading patient profiles...</option>';

            try {
                const response = await getReceptionistPatients({ limit: 100 });
                patients = normalizeListResponse(response, ['patients', 'users']);

                allProfiles = [];

                for (const patient of patients) {
                    const patientId = patient._id || patient.id;
                    let profiles = patient.profiles || patient.patientProfiles || [];

                    if (patient.primaryProfile) {
                        profiles = [patient.primaryProfile, ...profiles.filter(p => String(p._id || p.id) !== String(patient.primaryProfile._id || patient.primaryProfile.id))];
                    }

                    if ((!profiles || profiles.length === 0) && patientId && typeof getReceptionistPatientById === 'function') {
                        try {
                            const details = await getReceptionistPatientById(patientId);
                            profiles = details.profiles || details.data?.profiles || details.user?.profiles || details.patient?.profiles || [];
                        } catch (error) {
                            console.warn('Could not load profiles for patient:', patientId, error.message || error);
                        }
                    }

                    profiles.forEach(profile => {
                        allProfiles.push({
                            ...profile,
                            patientUserId: patientId,
                            patientName: patient.fullName || patient.name || 'Unknown Patient',
                            patientPhone: patient.phoneNumber || '-'
                        });
                    });
                }

                populateProfileOptions(allProfiles);
            } catch (error) {
                console.error('Failed to load patients/profiles:', error);
                patients = [];
                allProfiles = [];
                profileSelect.innerHTML = '<option value="">Could not load patient profiles</option>';
                profileSelect.disabled = false;
            }
        }

        function populateProfileOptions(profiles) {
            const profileSelect = document.getElementById('patientProfile');
            profileSelect.innerHTML = '<option value="">Select patient profile</option>';
            profileSelect.disabled = false;

            if (!profiles || profiles.length === 0) {
                profileSelect.innerHTML = '<option value="">No patient profiles found</option>';
                return;
            }

            profiles.forEach(profile => {
                const option = document.createElement('option');
                option.value = profile._id || profile.id;
                option.dataset.patientUserId = profile.patientUserId || '';
                option.textContent = `${profile.fullName || 'Unknown Profile'}${profile.isPrimary ? ' (Primary)' : ''} - ${profile.patientName || 'Patient'}`;
                profileSelect.appendChild(option);
            });
        }

        
    async function getReceptionistDoctors() {
    return apiGet('/receptionist/doctors');
   }
   
        //get doctors

       async function loadDoctors() {
    const select = document.getElementById('doctorUserId');

    try {
        select.disabled = true;
        select.innerHTML = '<option value="">Loading doctors...</option>';

        const response = await getReceptionistDoctors();

        if (Array.isArray(response)) {
            doctors = response;
        } else if (response && Array.isArray(response.data)) {
            doctors = response.data;
        } else if (response && Array.isArray(response.users)) {
            doctors = response.users;
        } else if (response && response.data && Array.isArray(response.data.users)) {
            doctors = response.data.users;
        } else if (response && response.data && Array.isArray(response.data.doctors)) {
            doctors = response.data.doctors;
        } else {
            doctors = [];
        }

        select.innerHTML = '<option value="">Select a doctor...</option>';

        doctors.forEach(function (doctor) {
            const option = document.createElement('option');
            option.value = doctor._id || doctor.id;
            option.textContent = doctor.fullName || 'Unknown Doctor';
            select.appendChild(option);
        });

        select.disabled = doctors.length === 0;

        if (doctors.length === 0) {
            select.innerHTML = '<option value="">No doctors found</option>';
        }

    } catch (error) {
        console.error('Failed to load doctors:', error);

        doctors = [];
        select.disabled = true;
        select.innerHTML = '<option value="">Doctor list not available</option>';

        if (typeof showToast === 'function') {
            showToast('Failed to load doctors', 'error');
        }
    }
}

        async function searchPatients() {
            const searchTerm = document.getElementById('patientSearch').value.trim();
            const resultsDiv = document.getElementById('patientSearchResults');

            if (searchTerm.length < 2) {
                resultsDiv.style.display = 'none';
                populateProfileOptions(allProfiles);
                selectedPatient = null;
                return;
            }

            try {
                const response = await getReceptionistPatients({ search: searchTerm, limit: 10 });
                const searchResults = normalizeListResponse(response, ['patients', 'users']);

                if (searchResults.length === 0) {
                    resultsDiv.innerHTML = '<div class="search-result">No patients found</div>';
                    resultsDiv.style.display = 'block';
                    return;
                }

                resultsDiv.innerHTML = searchResults.map(patient => {
                    const safeName = String(patient.fullName || patient.name || '').replace(/'/g, '&#039;');
                    return `
                        <div class="search-result" onclick="selectPatientFromSearch('${patient._id || patient.id}', '${safeName}')">
                            <div class="search-result-name">${patient.fullName || patient.name || 'Unknown'}</div>
                            <div class="search-result-phone">${patient.phoneNumber || '-'}</div>
                        </div>
                    `;
                }).join('');
                resultsDiv.style.display = 'block';
            } catch (error) {
                console.error('Search failed:', error);
                resultsDiv.style.display = 'none';
            }
        }

        async function selectPatientFromSearch(patientId, patientName) {
            document.getElementById('patientSearch').value = patientName;
            document.getElementById('patientSearchResults').style.display = 'none';
            await selectPatient(patientId);
        }

        async function selectPatient(patientId) {
            try {
                let patientProfiles = allProfiles.filter(profile => String(profile.patientUserId) === String(patientId));

                if (patientProfiles.length === 0 && typeof getReceptionistPatientById === 'function') {
                    const response = await getReceptionistPatientById(patientId);
                    selectedPatient = response.user || response.patient || response.data?.user || response.data?.patient || null;
                    patientProfiles = response.profiles || response.data?.profiles || selectedPatient?.profiles || [];
                    patientProfiles = patientProfiles.map(profile => ({
                        ...profile,
                        patientUserId: patientId,
                        patientName: selectedPatient?.fullName || selectedPatient?.name || 'Selected Patient',
                        patientPhone: selectedPatient?.phoneNumber || '-'
                    }));
                } else {
                    selectedPatient = patients.find(patient => String(patient._id || patient.id) === String(patientId)) || null;
                }

                if (selectedPatient) {
                    document.getElementById('patientSearch').value = selectedPatient.fullName || selectedPatient.name || '';
                }

                populateProfileOptions(patientProfiles);
            } catch (error) {
                console.error('Failed to select patient:', error);
                handleReceptionistError(error, 'Failed to load patient profiles');
            }
        }

        function toggleHomeVisitAddress() {
            const appointmentType = document.getElementById('appointmentType').value;
            const addressGroup = document.getElementById('homeVisitAddressGroup');
            const addressInput = document.getElementById('homeVisitAddress');

            if (appointmentType === 'home_visit') {
                addressGroup.style.display = 'block';
                addressInput.required = true;
            } else {
                addressGroup.style.display = 'none';
                addressInput.required = false;
                addressInput.value = '';
            }
        }

    
    async function handleCreateAppointment(event) {
    event.preventDefault();
    clearErrors();

    const patientProfileId = document.getElementById('patientProfile').value;
    const doctorUserId = document.getElementById('doctorUserId').value;
    const appointmentType = document.getElementById('appointmentType').value;
    const appointmentDate = document.getElementById('appointmentDate').value;
    const appointmentTime = document.getElementById('appointmentTime').value;
    const homeVisitAddress = document.getElementById('homeVisitAddress').value.trim();
    const notes = document.getElementById('notes').value.trim();

    let hasError = false;

    if (!patientProfileId) {
        document.getElementById('profileError').textContent = 'Please select a patient profile';
        hasError = true;
    }

    if (!doctorUserId) {
        document.getElementById('doctorError').textContent = 'Please select a doctor';
        hasError = true;
    }

    if (!appointmentType) {
        hasError = true;
    }

    if (!appointmentDate) {
        document.getElementById('dateError').textContent = 'Appointment date is required';
        hasError = true;
    } else if (typeof validateDate === 'function' && !validateDate(appointmentDate)) {
        document.getElementById('dateError').textContent = 'Appointment date cannot be in the past';
        hasError = true;
    }

    if (!appointmentTime) {
        document.getElementById('timeError').textContent = 'Appointment time is required';
        hasError = true;
    }

    if (appointmentType === 'home_visit' && !homeVisitAddress) {
        document.getElementById('addressError').textContent = 'Home visit address is required';
        hasError = true;
    }

    if (hasError) return;

    try {
        const createBtn = document.getElementById('createBtn');
        createBtn.disabled = true;
        createBtn.textContent = 'Creating...';

        const payload = {
            patientProfileId,
            doctorUserId,
            appointmentType,
            appointmentDate,
            appointmentTime,
            notes
        };

        if (appointmentType === 'home_visit') {
            payload.homeVisitAddress = homeVisitAddress;
        }

        const response = await createReceptionistAppointment(payload);
        const appointment = response.appointment || response.data?.appointment || response.data || response;

        if (appointment && (appointment._id || appointment.id || response.success)) {
            showSuccess(appointment);
        } else {
            throw new Error(response.message || 'Invalid response format');
        }

    } catch (error) {
        console.error('Failed to create appointment:', error);
        handleReceptionistError(error, 'Failed to create appointment');
    } finally {
        const createBtn = document.getElementById('createBtn');
        createBtn.disabled = false;
        createBtn.textContent = 'Create Appointment';
    }
}

function showSuccess(appointment) {
    document.getElementById('appointmentForm').style.display = 'none';
    document.getElementById('createSuccess').style.display = 'block';

    const selectedDoctorId =
        appointment.doctorUserId ||
        document.getElementById('doctorUserId').value;

    const doctor = doctors.find(function (item) {
        return String(item._id || item.id) === String(selectedDoctorId);
    });

    const profileOption = document.getElementById('patientProfile').selectedOptions[0];

    document.getElementById('appointmentSummary').innerHTML = `
        <div style="display:grid;gap:10px;">
            <div><strong>Patient Profile:</strong> ${appointment.profileName || profileOption?.textContent || 'Unknown'}</div>
            <div><strong>Doctor:</strong> ${appointment.doctorName || doctor?.fullName || doctor?.name || 'Unknown'}</div>
            <div><strong>Type:</strong> ${typeof formatAppointmentType === 'function' ? formatAppointmentType(appointment.appointmentType) : appointment.appointmentType}</div>
            <div><strong>Date:</strong> ${typeof formatDate === 'function' ? formatDate(appointment.appointmentDate) : appointment.appointmentDate}</div>
            <div><strong>Time:</strong> ${typeof formatTime === 'function' ? formatTime(appointment.appointmentTime) : appointment.appointmentTime}</div>
            <div><strong>Status:</strong> ${typeof formatAppointmentStatus === 'function' ? formatAppointmentStatus(appointment.appointmentStatus || 'pending') : (appointment.appointmentStatus || 'pending')}</div>
            ${appointment.notes ? `<div><strong>Notes:</strong> ${appointment.notes}</div>` : ''}
            ${appointment.homeVisitAddress ? `<div><strong>Address:</strong> ${appointment.homeVisitAddress}</div>` : ''}
        </div>
    `;
}
        function showSuccess(appointment) {
            document.getElementById('appointmentForm').style.display = 'none';
            document.getElementById('createSuccess').style.display = 'block';

            const doctor = doctors.find(item => String(item._id || item.id) === String(appointment.doctorUserId || document.getElementById('doctor').value));
            const profileOption = document.getElementById('patientProfile').selectedOptions[0];

            document.getElementById('appointmentSummary').innerHTML = `
                <div style="display:grid;gap:10px;">
                    <div><strong>Patient Profile:</strong> ${appointment.profileName || profileOption?.textContent || 'Unknown'}</div>
                    <div><strong>Doctor:</strong> ${appointment.doctorName || doctor?.fullName || doctor?.name || 'Unknown'}</div>
                    <div><strong>Type:</strong> ${typeof formatAppointmentType === 'function' ? formatAppointmentType(appointment.appointmentType) : appointment.appointmentType}</div>
                    <div><strong>Date:</strong> ${typeof formatDate === 'function' ? formatDate(appointment.appointmentDate) : appointment.appointmentDate}</div>
                    <div><strong>Time:</strong> ${typeof formatTime === 'function' ? formatTime(appointment.appointmentTime) : appointment.appointmentTime}</div>
                    <div><strong>Status:</strong> ${typeof formatAppointmentStatus === 'function' ? formatAppointmentStatus(appointment.appointmentStatus || 'pending') : (appointment.appointmentStatus || 'pending')}</div>
                    ${appointment.notes ? `<div><strong>Notes:</strong> ${appointment.notes}</div>` : ''}
                    ${appointment.homeVisitAddress ? `<div><strong>Address:</strong> ${appointment.homeVisitAddress}</div>` : ''}
                </div>
            `;
        }

        function viewAppointments() {
            window.location.href = 'appointments.html';
        }

        function createAnotherAppointment() {
            document.getElementById('createAppointmentForm').reset();
            populateProfileOptions(allProfiles);
            document.getElementById('createSuccess').style.display = 'none';
            document.getElementById('appointmentForm').style.display = 'block';
            document.getElementById('homeVisitAddressGroup').style.display = 'none';
            selectedPatient = null;
            clearErrors();
        }

        document.addEventListener('click', function(event) {
            const searchInput = document.getElementById('patientSearch');
            const resultsDiv = document.getElementById('patientSearchResults');

            if (!searchInput.contains(event.target) && !resultsDiv.contains(event.target)) {
                resultsDiv.style.display = 'none';
            }
        });

        document.addEventListener('DOMContentLoaded', initializePage);
    </script>

</body>
</html>
