<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Patient Portal</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
    <style>
        body{background:#f8fafc}
        .dashboard{display:flex;flex-direction:column;min-height:100vh}
        .dashboard-body{display:flex;flex:1}
        .sidebar{width:250px;background:#fff;border-right:1px solid #e2e8f0;padding:20px 0}
        .sidebar-logo{padding:0 20px 20px;border-bottom:1px solid #e2e8f0;margin-bottom:20px}
        .sidebar-logo h2{color:#0f766e;font-size:20px}
        .sidebar-menu{list-style:none}
        .sidebar-menu li a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:#64748b;text-decoration:none;transition:all .2s}
        .sidebar-menu li a:hover,.sidebar-menu li a.active{background:#ccfbf1;color:#0f766e;border-right:3px solid #0f766e}
        .main-area{flex:1}
        .top-bar{background:#fff;padding:15px 30px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
        .user-info{display:flex;align-items:center;gap:10px}
        .user-avatar{width:40px;height:40px;background:#0f766e;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold}
        .page-header{margin-bottom:25px}
        .page-header h1{font-size:24px;color:#0f172a}
        .settings-container{max-width:800px}
        .settings-section{background:#fff;padding:25px;border-radius:8px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
        .settings-section h2{font-size:18px;margin-bottom:20px;color:#0f172a;border-bottom:1px solid #eee;padding-bottom:10px}
        .logout-btn{background:transparent;border:1px solid #dc3545;color:#dc3545;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:14px}
        .logout-btn:hover{background:#dc3545;color:#fff}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;margin-bottom:8px;font-weight:500}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#0f766e}
        .page-header{margin-bottom:25px}
        .page-header h1{font-size:24px; position: relative; overflow: hidden; background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.10), transparent 30%), radial-gradient(circle at bottom left, rgba(15, 118, 110, 0.08), transparent 32%), #f8fafc; }

        .content-area { padding: 30px; position: relative; overflow: hidden; background: radial-gradient(circle at 80% 12%, rgba(15, 118, 110, 0.035), transparent 34%), radial-gradient(circle at 18% 78%, rgba(37, 99, 235, 0.025), transparent 38%), linear-gradient(135deg, #f7fafc 0%, #f3f7f9 45%, #eef4f7 100%); }
        .content-area::before { content: ""; position: absolute; width: 780px; height: 780px; border: 1px solid rgba(15, 118, 110, 0.045); border-radius: 50%; top: -260px; right: -160px; pointer-events: none; z-index: 0; }
        .content-area::after { content: ""; position: absolute; width: 680px; height: 680px; border: 1px solid rgba(37, 99, 235, 0.035); border-radius: 50%; bottom: -360px; left: -240px; pointer-events: none; z-index: 0; }
        .content-area > * { position: relative; z-index: 1; }
</style>
</head>
<body>
    <div class="dashboard">
        <div class="dashboard-body">
            <aside class="sidebar">
                <div class="sidebar-logo"><h2>Medical Lab</h2></div>
                <ul class="sidebar-menu">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="select-profile.html">Select Profile</a></li>
                    <li><a href="book-appointment.html">Book Appointment</a></li>
                    <li><a href="appointments.html">My Appointments</a></li>
                    <li><a href="lab-results.html">Lab Results</a></li>
                    <li><a href="family-members.html">Family Members</a></li>
                    <li><a href="profile.html">My Profile</a></li>
                    <li><a href="settings.html" class="active">Settings</a></li>
                </ul>
            </aside>
            <div class="main-area">
                <div class="top-bar">
                    <div class="user-info">
                        <div class="user-avatar" id="userInitials">JP</div>
                        <div class="user-details">
                            <span class="user-name" id="userName">John Patient</span>
                            <span class="user-role">Patient</span>
                        </div>
                    </div>
                    <div class="top-bar-right">
                        <button class="logout-btn" onclick="logoutUser()">Logout</button>
                    </div>
                </div>
                <div class="content-area">
                    <div class="page-header">
                        <h1>Settings</h1>
                    </div>
                    <div class="settings-container">
                        <div class="settings-section">
                            <h2>Change Password</h2>
                            <div class="form-group">
                                <label>Current Password</label>
                                <input type="password" id="currentPassword" placeholder="Enter current password">
                            </div>
                            <div class="form-group">
                                <label>New Password</label>
                                <input type="password" id="newPassword" placeholder="Enter new password">
                            </div>
                            <div class="form-group">
                                <label>Confirm New Password</label>
                                <input type="password" id="confirmPassword" placeholder="Confirm new password">
                            </div>
                            <button class="btn-primary" onclick="changePassword()">Update Password</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/ui.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/guards.js"></script>
    <script src="../../assets/js/patient.js"></script>
    <script>
        // Require patient role
        requireRole('patient');

        // Initialize page
        async function initializePage() {
            try {
                const user = getCurrentUser();
                if (!user) {
                    window.location.href = '../../index.html';
                    return;
                }

                // Update user info in top bar
                document.getElementById('userName').textContent = user.fullName || user.name || 'Patient';
                const name = user.fullName || user.name || 'Patient';
                const initials = name.split(' ').map(n => n[0]).join('').toUpperCase();
                document.getElementById('userInitials').textContent = initials;

            } catch (error) {
                console.error('Failed to initialize page:', error);
                if (typeof showToast === 'function') {
                    showToast('Failed to load page', 'error');
                }
            }
        }

        // Change password function
        async function changePassword() {
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (!current || !newPass || !confirm) { 
                if (typeof showToast === 'function') {
                    showToast('Please fill all fields', 'error');
                } else {
                    alert('Please fill all fields');
                }
                return; 
            }
            if (newPass !== confirm) { 
                if (typeof showToast === 'function') {
                    showToast('Passwords do not match', 'error');
                } else {
                    alert('Passwords do not match');
                }
                return; 
            }
            if (newPass.length < 6) { 
                if (typeof showToast === 'function') {
                    showToast('Password must be at least 6 characters', 'error');
                } else {
                    alert('Password must be at least 6 characters');
                }
                return; 
            }

            try {
                await changePassword(current, newPass);
                if (typeof showToast === 'function') {
                    showToast('Password updated successfully!', 'success');
                } else {
                    alert('Password updated successfully!');
                }
                // Clear form
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            } catch (error) {
                console.error('Failed to change password:', error);
                if (typeof showToast === 'function') {
                    showToast(error.message || 'Failed to change password', 'error');
                } else {
                    alert('Failed to change password');
                }
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
