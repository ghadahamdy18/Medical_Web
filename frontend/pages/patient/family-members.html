<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Members - Medical Lab</title>
    <link rel="stylesheet" href="../../css/dashboard.css">

    <style>
        body{background:#f8fafc}
        .dashboard{display:flex;flex-direction:column;min-height:100vh}
        .dashboard-body{display:flex;flex:1}
        .sidebar{width:250px;background:#fff;border-right:1px solid #e2e8f0;padding:20px 0}
        .sidebar-logo{padding:0 20px 20px;border-bottom:1px solid #e2e8f0;margin-bottom:20px}
        .sidebar-logo h2{color:#0f766e;font-size:20px}
        .sidebar-menu{list-style:none;padding:0;margin:0}
        .sidebar-menu li a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:#64748b;text-decoration:none;transition:all .2s}
        .sidebar-menu li a:hover,.sidebar-menu li a.active{background:#ccfbf1;color:#0f766e;border-right:3px solid #0f766e}
        .main-area{flex:1}
        .top-bar{background:#fff;padding:15px 30px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
        .user-info{display:flex;align-items:center;gap:10px}
        .user-avatar{width:40px;height:40px;background:#0f766e;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold}
        .user-details{display:flex;flex-direction:column}
        .user-name{font-weight:600;font-size:14px}
        .user-role{font-size:12px;color:#64748b}
        .back-link{display:inline-block;margin-bottom:20px;color:#0f766e;text-decoration:none}
        .page-header{margin-bottom:25px}
        .page-header h1{font-size:24px;color:#0f172a}
        .page-header p{color:#64748b}
        .family-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
        .family-card{background:#fff;padding:25px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);position:relative}
        .family-card.primary{border:2px solid #0f766e}
        .primary-badge{position:absolute;top:15px;right:15px;background:#0f766e;color:#fff;font-size:11px;padding:4px 10px;border-radius:10px}
        .family-avatar{width:60px;height:60px;background:#ccfbf1;color:#0f766e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;margin-bottom:15px}
        .family-name{font-size:18px;font-weight:600;margin-bottom:5px}
        .family-relation{color:#64748b;font-size:14px;margin-bottom:15px}
        .family-details{font-size:13px;color:#64748b;line-height:1.7}
        .family-actions{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
        .btn-view{background:#0f766e;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer}
        .btn-view:hover{background:#115e59}
        .btn-primary-action{background:#6c757d;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer}
        .empty-message{background:#fff;border-radius:8px;padding:40px;text-align:center;color:#64748b;box-shadow:0 2px 8px rgba(0,0,0,.06)}
        .logout-btn{background:transparent;border:1px solid #dc3545;color:#dc3545;padding:8px 16px;border-radius:4px;cursor:pointer}
        .logout-btn:hover{background:#dc3545;color:#fff}
        .back-link{display:inline-block; position: relative; overflow: hidden; background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.10), transparent 30%), radial-gradient(circle at bottom left, rgba(15, 118, 110, 0.08), transparent 32%), #f8fafc; }

        .content-area { padding: 30px; position: relative; overflow: hidden; background: radial-gradient(circle at 80% 12%, rgba(15, 118, 110, 0.035), transparent 34%), radial-gradient(circle at 18% 78%, rgba(37, 99, 235, 0.025), transparent 38%), linear-gradient(135deg, #f7fafc 0%, #f3f7f9 45%, #eef4f7 100%); }
        .content-area::before { content: ""; position: absolute; width: 780px; height: 780px; border: 1px solid rgba(15, 118, 110, 0.045); border-radius: 50%; top: -260px; right: -160px; pointer-events: none; z-index: 0; }
        .content-area::after { content: ""; position: absolute; width: 680px; height: 680px; border: 1px solid rgba(37, 99, 235, 0.035); border-radius: 50%; bottom: -360px; left: -240px; pointer-events: none; z-index: 0; }
        .content-area > * { position: relative; z-index: 1; }
</style>
</head>

<body>
    <div class="dashboard">
        <div class="dashboard-body">
            <aside class="sidebar">
                <div class="sidebar-logo">
                    <h2>Medical Lab</h2>
                </div>

                <ul class="sidebar-menu">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="select-profile.html">Select Profile</a></li>
                    <li><a href="book-appointment.html">Book Appointment</a></li>
                    <li><a href="appointments.html">My Appointments</a></li>
                    <li><a href="lab-results.html">Lab Results</a></li>
                    <li><a href="family-members.html" class="active">Family Members</a></li>
                    <li><a href="profile.html">My Profile</a></li>
                    <li><a href="settings.html">Settings</a></li>
                </ul>
            </aside>

            <div class="main-area">
                <div class="top-bar">
                    <div class="user-info">
                        <div class="user-avatar" id="userInitials">P</div>
                        <div class="user-details">
                            <span class="user-name" id="userName">Patient</span>
                            <span class="user-role">Patient</span>
                        </div>
                    </div>

                    <div class="top-bar-right">
                        <button class="logout-btn" onclick="logoutUser()">Logout</button>
                    </div>
                </div>

                <div class="content-area">
                    <a href="dashboard.html" class="back-link">← Back to Dashboard</a>

                    <div class="page-header">
                        <h1>Family Members</h1>
                        <p>Manage your family profiles under one account</p>
                    </div>

                    <div class="family-grid" id="familyGrid">
                        <div class="empty-message">Loading family profiles...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/ui.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/guards.js"></script>
    <script src="../../assets/js/patient.js"></script>

    <script>
        requireRole('patient');

        let profiles = [];

        function getInitials(name) {
            if (!name) return 'P';

            return String(name)
                .trim()
                .split(/\s+/)
                .map(function (part) {
                    return part.charAt(0);
                })
                .join('')
                .toUpperCase()
                .slice(0, 2);
        }

        function formatDate(dateString) {
            if (!dateString) return 'Not provided';

            const date = new Date(dateString);

            if (isNaN(date.getTime())) return 'Not provided';

            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function formatGender(gender) {
            if (!gender) return 'Not provided';

            return String(gender).charAt(0).toUpperCase() + String(gender).slice(1);
        }

        function formatRelationship(profile) {
            if (profile.isPrimary) return 'Self / Primary';

            return profile.relationshipToPrimary || 'Family Member';
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        async function initializePage() {
            try {
                const user = getCurrentUser();

                if (!user) {
                    window.location.href = '../../index.html';
                    return;
                }

                const name = user.fullName || user.name || 'Patient';

                document.getElementById('userName').textContent = name;
                document.getElementById('userInitials').textContent = getInitials(name);

                await loadProfiles();
            } catch (error) {
                console.error('Failed to initialize page:', error);

                if (typeof showToast === 'function') {
                    showToast('Failed to load page', 'error');
                }
            }
        }

        async function loadProfiles() {
            const familyGrid = document.getElementById('familyGrid');

            try {
                profiles = await getPatientProfiles();

                if (!profiles || profiles.length === 0) {
                    familyGrid.innerHTML =
                        '<div class="empty-message">No family profiles found</div>';
                    return;
                }

                let selectedProfile = getSelectedPatientProfile();

                if (!selectedProfile) {
                    selectedProfile =
                        profiles.find(function (profile) {
                            return profile.isPrimary === true;
                        }) || profiles[0];

                    saveSelectedPatientProfile(selectedProfile);
                }

                familyGrid.innerHTML = profiles.map(function (profile) {
                    const isSelected =
                        selectedProfile && String(selectedProfile._id) === String(profile._id);

                    const initials = getInitials(profile.fullName);

                    return `
                        <div class="family-card ${isSelected ? 'primary' : ''}">
                            ${isSelected ? '<span class="primary-badge">Currently Viewing</span>' : ''}

                            <div class="family-avatar">${escapeHtml(initials)}</div>

                            <div class="family-name">${escapeHtml(profile.fullName || 'Unnamed Profile')}</div>

                            <div class="family-relation">
                                ${escapeHtml(formatRelationship(profile))}
                            </div>

                            <div class="family-details">
                                <p><strong>DOB:</strong> ${escapeHtml(formatDate(profile.dateOfBirth))}</p>
                                <p><strong>Gender:</strong> ${escapeHtml(formatGender(profile.gender))}</p>
                                <p><strong>National ID:</strong> ${escapeHtml(profile.nationalId || 'Not provided')}</p>
                                <p><strong>Email:</strong> ${escapeHtml(profile.email || 'Not provided')}</p>
                                <p><strong>Address:</strong> ${escapeHtml(profile.address || 'Not provided')}</p>
                            </div>

                            <div class="family-actions">
                                ${
                                    isSelected
                                        ? '<button class="btn-primary-action" type="button">Currently Selected</button>'
                                        : `<button class="btn-view" type="button" onclick="selectProfile('${profile._id}')">Select Profile</button>`
                                }
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Failed to load profiles:', error);

                familyGrid.innerHTML =
                    '<div class="empty-message">Failed to load family profiles</div>';

                if (typeof showToast === 'function') {
                    showToast('Failed to load family profiles', 'error');
                }
            }
        }

        async function selectProfile(profileId) {
            try {
                const profile = profiles.find(function (item) {
                    return String(item._id) === String(profileId);
                });

                if (!profile) {
                    throw new Error('Profile not found');
                }

                await selectPatientProfile(profileId);
                saveSelectedPatientProfile(profile);

                if (typeof showToast === 'function') {
                    showToast('Profile selected successfully!', 'success');
                }

                await loadProfiles();

                setTimeout(function () {
                    window.location.href = 'dashboard.html';
                }, 700);
            } catch (error) {
                console.error('Failed to select profile:', error);

                if (typeof showToast === 'function') {
                    showToast(error.message || 'Failed to select profile', 'error');
                } else {
                    alert(error.message || 'Failed to select profile');
                }
            }
        }

        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
