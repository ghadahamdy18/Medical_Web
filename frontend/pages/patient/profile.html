<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Medical Lab</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
    <style>body{background:#f5f5f5}.dashboard{display:flex;flex-direction:column;min-height:100vh}.dashboard-body{display:flex;flex:1}.sidebar{width:250px;background:#fff;border-right:1px solid #e0e0e0;padding:20px 0}.sidebar-logo{padding:0 20px 20px;border-bottom:1px solid #e0e0e0;margin-bottom:20px}.sidebar-logo h2{color:#2c7be5;font-size:20px}.sidebar-menu{list-style:none}.sidebar-menu li a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:#555;text-decoration:none;transition:all .2s}.sidebar-menu li a:hover,.sidebar-menu li a.active{background:#e8f0fe;color:#2c7be5;border-right:3px solid #2c7be5}.main-area{flex:1}.top-bar{background:#fff;padding:15px 30px;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center}.user-info{display:flex;align-items:center;gap:10px}.user-avatar{width:40px;height:40px;background:#2c7be5;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold}.user-details{display:flex;flex-direction:column}.user-name{font-weight:600;font-size:14px}.user-role{font-size:12px;color:#666}.content-area{padding:30px}.back-link{display:inline-block;margin-bottom:20px;color:#2c7be5;text-decoration:none}.page-header{margin-bottom:25px}.page-header h1{font-size:24px;color:#333}.profile-card{background:#fff;padding:30px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);max-width:600px}.profile-header{display:flex;align-items:center;gap:20px;margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid #eee}.profile-avatar{width:80px;height:80px;background:#2c7be5;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px}.profile-name h2{font-size:22px;margin-bottom:5px}.profile-name p{color:#666}.profile-form .form-group{margin-bottom:20px}.profile-form label{display:block;margin-bottom:8px;font-weight:600}.profile-form input,.profile-form select{width:100%;padding:12px;border:1px solid #ddd;border-radius:4px;font-size:14px}.profile-form input:focus,.profile-form select:focus{outline:none;border-color:#2c7be5}.btn-save{background:#2c7be5;color:#fff;border:none;padding:12px 24px;border-radius:4px;cursor:pointer;font-size:14px}.btn-save:hover{background:#1a68d4}</style>
</head>
<body>
    <div class="dashboard">
        <div class="dashboard-body">
            <aside class="sidebar">
                <div class="sidebar-logo"><h2>Medical Lab</h2></div>
                <ul class="sidebar-menu">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="book-appointment.html">Book Appointment</a></li>
                    <li><a href="appointments.html">My Appointments</a></li>
                    <li><a href="lab-results.html">Lab Results</a></li>
                    <li><a href="family-members.html">Family Members</a></li>
                    <li><a href="profile.html" class="active">My Profile</a></li>
                    <li><a href="settings.html">Settings</a></li>
                </ul>
            </aside>
            <div class="main-area">
                <div class="top-bar">
                    <div class="user-info">
                        <div class="user-avatar">JP</div>
                        <div class="user-details">
                            <span class="user-name">John Patient</span>
                            <span class="user-role">Patient</span>
                        </div>
                    </div>
                </div>
                <div class="content-area">
                    <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
                    <div class="page-header">
                        <h1>My Profile</h1>
                    </div>
                    <div class="profile-card">
                        <div class="profile-header">
                            <div class="profile-avatar">JP</div>
                            <div class="profile-name">
                                <h2>John Patient</h2>
                                <p>Patient Account</p>
                            </div>
                        </div>
                        <form class="profile-form">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" value="John Patient">
                            </div>
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" value="1234567890">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" value="john@example.com">
                            </div>
                            <div class="form-group">
                                <label>Date of Birth</label>
                                <input type="date" value="1990-05-15">
                            </div>
                            <div class="form-group">
                                <label>Gender</label>
                                <select>
                                    <option>Male</option>
                                    <option>Female</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <button type="button" class="btn-save" onclick="alert('Profile updated!')">Save Changes</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../../js/auth.js"></script>
</body>
</html>
