<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Details - Admin Portal</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <style>
        .notification-detail { max-width: 700px; margin: 0 auto; }
        .detail-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 30px; }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="page-header">
            <h1><a href="notifications.html" style="color: #333; text-decoration: none;">←</a> Notification Details</h1>
        </div>

        <div class="notification-detail">
            <div class="detail-card">
                <div style="display: flex; gap: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; margin-bottom: 20px;">
                    <div style="width: 60px; height: 60px; background: #e8f0fe; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px;">👨‍⚕️</div>
                    <div>
                        <div style="font-size: 24px; font-weight: 600;">New Doctor Request</div>
                        <div style="color: #999; font-size: 14px;">Today, 10:00 AM</div>
                    </div>
                </div>
                <div style="font-size: 16px; line-height: 1.8; color: #333; margin-bottom: 20px;">
                    <p><strong>Dr. Emily Chen</strong> has submitted a request for access to the Doctor Portal.</p>
                    <p style="margin-top: 15px;"><strong>Details:</strong></p>
                    <p>• Specialization: Cardiology</p>
                    <p>• License Number: MD-2024-5678</p>
                    <p>• Email: emily.chen@email.com</p>
                    <p>• Phone: (555) 987-6543</p>
                </div>
                <div class="form-actions">
                    <a href="approvals.html" class="btn-primary">Review Request</a>
                    <button class="btn-secondary" onclick="markAsRead()">Mark as Read</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../js/auth.js"></script>
    <script>
        function markAsRead() {
            alert('Notification marked as read');
            window.location.href = 'notifications.html';
        }
    </script>
</body>
</html>
